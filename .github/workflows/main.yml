name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-ml-app:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GCP VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          port: 22
          script: |
            set -e

            # 1. Docker 로그인
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            # 2. 기존 배포 컨테이너 정리
            docker stop my-app-container || true
            docker rm my-app-container || true

            # 3. 80번 포트를 잡고 있던 기존 수동 실행 컨테이너 정리
            docker stop nice_wilbur || true
            docker rm nice_wilbur || true

            # 4. 최신 이미지 Pull
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/my-ml-app:latest

            # 5. 새 컨테이너 실행
            docker run -d \
              --name my-app-container \
              --restart unless-stopped \
              -p 80:8000 \
              ${{ secrets.DOCKERHUB_USERNAME }}/my-ml-app:latest

            # 6. 실행 확인
            docker ps
            docker logs --tail 50 my-app-container || true

            # 7. 미사용 이미지 정리
            docker image prune -f